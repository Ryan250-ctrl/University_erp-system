<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>order list</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.min.js"></script>
</head>
<body>
    <h1>ORDERS LIST</h1>
    <hr>
    <form method="post">
        <div class="row">
            <div class="form-group col-md-6">
                <label>FOOD_LIST </label>
                <select class="form-control" id="fl">
                    <option>RICE AND MEAT</option>
                    <option>BIRIANI</option>
                    <option>MATOOKE AND FISH</option>
                </select>
            </div>

            <div class="form-group col-md-6">
                <label>ORDER_FORMAT</label>
                <select class="form-control" id="of">
                    <option>Take Away</option>
                    <option>In-House</option>
                </select>
            </div>

            <div class="form-group col-md-6">
                <label>TOTAL_PRICE</label>
                <input class="form-control" name="tp" placeholder="Enter Amount">
            </div>

            <div class="form-group col-md-6">
                <label>&nbsp;</label>
                <input class="btn btn-success form-control" onclick="Order()" value="ORDER" type="submit">
            </div>


        </div>


    </form>
    
</body>
</html>
